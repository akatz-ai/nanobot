<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentsHQ Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-void: #08090d;
  --bg-primary: #0d0f14;
  --bg-surface: #12151c;
  --bg-elevated: #181c26;
  --bg-hover: #1e2330;
  --border-subtle: rgba(255,255,255,0.06);
  --border-default: rgba(255,255,255,0.1);
  --border-active: rgba(99,210,151,0.3);
  --text-primary: #e8eaf0;
  --text-secondary: #8b8fa3;
  --text-muted: #555872;
  --accent-green: #63d297;
  --accent-green-dim: rgba(99,210,151,0.15);
  --accent-blue: #5b9cf5;
  --accent-blue-dim: rgba(91,156,245,0.15);
  --accent-amber: #e5a84b;
  --accent-amber-dim: rgba(229,168,75,0.15);
  --accent-red: #e55b5b;
  --accent-red-dim: rgba(229,91,91,0.15);
  --accent-purple: #a78bfa;
  --accent-purple-dim: rgba(167,139,250,0.15);
  --discord-blurple: #5865F2;
  --discord-dim: rgba(88,101,242,0.15);
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --font-mono: 'JetBrains Mono', monospace;
  --font-sans: 'DM Sans', sans-serif;
  --font-serif: 'Instrument Serif', serif;
  --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-default: 250ms cubic-bezier(0.4, 0, 0.2, 1);
}
html { font-size: 15px; -webkit-font-smoothing: antialiased; }
body {
  font-family: var(--font-sans);
  background: var(--bg-void);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(99,210,151,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 80%, rgba(91,156,245,0.03) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.02) 2px, rgba(0,0,0,0.02) 4px);
  pointer-events: none;
  z-index: 1;
}
.app { position: relative; z-index: 2; display: flex; min-height: 100vh; }
.sidebar {
  width: 240px;
  min-height: 100vh;
  background: var(--bg-primary);
  border-right: 1px solid var(--border-subtle);
  display: flex;
  flex-direction: column;
  position: fixed;
  left: 0; top: 0; bottom: 0;
  z-index: 10;
}
.sidebar-header {
  padding: 24px 20px 18px;
  border-bottom: 1px solid var(--border-subtle);
}
.logo { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.logo-icon {
  width: 30px; height: 30px;
  background: var(--accent-green);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: var(--bg-void); font-weight: 700;
  font-family: var(--font-mono);
  box-shadow: 0 0 16px rgba(99,210,151,0.2);
}
.logo-text { font-family: var(--font-mono); font-size: 16px; font-weight: 600; letter-spacing: -0.5px; }
.logo-tag { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); letter-spacing: 0.5px; text-transform: uppercase; }
.nav { flex: 1; padding: 16px 12px; display: flex; flex-direction: column; gap: 2px; }
.nav-section-label {
  font-family: var(--font-mono);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-muted);
  padding: 12px 12px 6px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: all var(--transition-fast);
  font-size: 13.5px;
  color: var(--text-secondary);
}
.nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.nav-item.active { background: var(--accent-green-dim); color: var(--text-primary); }
.nav-item .nav-icon { width: 20px; text-align: center; font-size: 15px; }
.nav-item .nav-badge {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 10px;
  background: var(--bg-hover);
  color: var(--text-muted);
}
.nav-item.active .nav-badge { background: var(--accent-green-dim); color: var(--accent-green); }
.sidebar-footer {
  padding: 14px 16px;
  border-top: 1px solid var(--border-subtle);
  display: flex; flex-direction: column; gap: 8px;
}
.instance-badge {
  display: flex; align-items: center; gap: 8px;
  font-family: var(--font-mono); font-size: 11px; color: var(--text-muted);
}
.instance-badge .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent-green);
  box-shadow: 0 0 8px rgba(99,210,151,0.4);
}
.sidebar-link {
  font-size: 12px; color: var(--text-muted);
  text-decoration: none; cursor: pointer;
  transition: color var(--transition-fast);
}
.sidebar-link:hover { color: var(--text-secondary); }
.main {
  flex: 1;
  margin-left: 240px;
  padding: 32px 48px;
  max-width: 1100px;
}
.page { display: none; animation: fadeIn 0.25s ease; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.page-header { margin-bottom: 32px; display: flex; align-items: flex-end; justify-content: space-between; gap: 20px; }
.page-title { font-family: var(--font-serif); font-size: 32px; font-weight: 400; line-height: 1.15; }
.page-desc { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }
.card {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 24px;
  margin-bottom: 16px;
  transition: border-color var(--transition-fast);
}
.card:hover { border-color: var(--border-default); }
.card-sm { padding: 18px; }
.card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; gap: 16px; }
.card-header.compact { margin-bottom: 0; }
.btn-danger { background: rgba(239,68,68,0.12); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
.btn-danger:hover { background: rgba(239,68,68,0.22); border-color: rgba(239,68,68,0.5); }
.card-title { font-size: 15px; font-weight: 600; }
.card-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; line-height: 1.5; }
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
.stat-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  padding: 20px;
  transition: border-color var(--transition-fast);
}
.stat-card:hover { border-color: var(--border-default); }
.stat-label {
  font-family: var(--font-mono); font-size: 10px;
  text-transform: uppercase; letter-spacing: 1px;
  color: var(--text-muted); margin-bottom: 8px;
}
.stat-value { font-family: var(--font-mono); font-size: 26px; font-weight: 600; color: var(--text-primary); word-break: break-word; }
.stat-value.auto-size { font-size: clamp(13px, 2.5vw, 18px); }
.stat-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; line-height: 1.5; }
.stat-value.green { color: var(--accent-green); }
.stat-value.amber { color: var(--accent-amber); }
.stat-value.red { color: var(--accent-red); }
.stat-value.blue { color: var(--accent-blue); }
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  font-family: var(--font-sans); font-size: 13px; font-weight: 600;
  border: none; cursor: pointer;
  transition: all var(--transition-fast);
  text-decoration: none;
}
.btn-primary { background: var(--accent-green); color: var(--bg-void); box-shadow: 0 0 16px rgba(99,210,151,0.12); }
.btn-primary:hover { background: #7adcab; box-shadow: 0 0 24px rgba(99,210,151,0.2); transform: translateY(-1px); }
.btn-secondary { background: var(--bg-elevated); color: var(--text-primary); border: 1px solid var(--border-default); }
.btn-secondary:hover { background: var(--bg-hover); border-color: var(--border-active); }
.btn-ghost { background: transparent; color: var(--text-secondary); padding: 8px 14px; }
.btn-ghost:hover { color: var(--text-primary); background: var(--bg-hover); }
.btn-danger { background: var(--accent-red-dim); color: var(--accent-red); border: 1px solid rgba(229,91,91,0.2); }
.btn-danger:hover { background: rgba(229,91,91,0.25); }
.btn-sm { padding: 7px 14px; font-size: 12px; }
.btn-icon { padding: 8px; width: 34px; height: 34px; justify-content: center; }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th {
  text-align: left;
  font-family: var(--font-mono); font-size: 10px;
  text-transform: uppercase; letter-spacing: 1px;
  color: var(--text-muted);
  padding: 10px 14px;
  border-bottom: 1px solid var(--border-subtle);
}
td {
  padding: 14px;
  border-bottom: 1px solid var(--border-subtle);
  font-size: 13.5px;
  color: var(--text-secondary);
  vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,0.015); }
.pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 20px;
  font-family: var(--font-mono); font-size: 11px; font-weight: 500;
}
.pill-green { background: var(--accent-green-dim); color: var(--accent-green); }
.pill-amber { background: var(--accent-amber-dim); color: var(--accent-amber); }
.pill-red { background: var(--accent-red-dim); color: var(--accent-red); }
.pill-blue { background: var(--accent-blue-dim); color: var(--accent-blue); }
.pill-muted { background: var(--bg-hover); color: var(--text-muted); }
.pill-purple { background: var(--accent-purple-dim); color: var(--accent-purple); }
.pill .dot { width: 6px; height: 6px; border-radius: 50%; }
.pill-green .dot { background: var(--accent-green); }
.pill-amber .dot { background: var(--accent-amber); animation: pulse 1.5s infinite; }
.pill-red .dot { background: var(--accent-red); }
.pill-blue .dot { background: var(--accent-blue); }
.pill-purple .dot { background: var(--accent-purple); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.progress-track {
  width: 100%; height: 6px;
  background: var(--bg-hover);
  border-radius: 3px; overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: 3px;
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}
.progress-fill.green { background: var(--accent-green); box-shadow: 0 0 8px rgba(99,210,151,0.3); }
.progress-fill.amber { background: var(--accent-amber); box-shadow: 0 0 8px rgba(229,168,75,0.3); }
.progress-fill.red { background: var(--accent-red); box-shadow: 0 0 8px rgba(229,91,91,0.3); }
.progress-fill.blue { background: var(--accent-blue); box-shadow: 0 0 8px rgba(91,156,245,0.3); }
.progress-fill.purple { background: var(--accent-purple); box-shadow: 0 0 8px rgba(167,139,250,0.3); }
.section-label {
  font-family: var(--font-mono); font-size: 10px;
  text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--text-muted); margin-bottom: 14px;
}
.input-group { margin-bottom: 18px; }
.input-label { display: block; font-size: 12.5px; font-weight: 500; color: var(--text-secondary); margin-bottom: 5px; }
.input-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; font-family: var(--font-mono); }
input[type="text"], input[type="password"], select, textarea {
  width: 100%; padding: 10px 13px;
  background: var(--bg-elevated); border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  color: var(--text-primary); font-family: var(--font-mono); font-size: 13px;
  transition: all var(--transition-fast); outline: none;
}
input:focus, select:focus, textarea:focus { border-color: var(--accent-green); box-shadow: 0 0 0 3px rgba(99,210,151,0.1); }
input::placeholder, textarea::placeholder { color: var(--text-muted); }
textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
.terminal {
  background: var(--bg-void); border: 1px solid var(--border-subtle);
  border-radius: var(--radius-sm); padding: 16px;
  font-family: var(--font-mono); font-size: 12px; line-height: 1.7;
  color: var(--text-secondary); max-height: 300px; overflow-y: auto;
}
.terminal .g { color: var(--accent-green); }
.terminal .b { color: var(--accent-blue); }
.terminal .a { color: var(--accent-amber); }
.terminal .r { color: var(--accent-red); }
.terminal .d { color: var(--text-muted); }
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
  z-index: 100; align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg-surface); border: 1px solid var(--border-default);
  border-radius: var(--radius-lg); padding: 32px;
  width: 720px; max-width: 92vw; max-height: 85vh; overflow-y: auto;
  animation: modalIn 0.2s ease;
}
@keyframes modalIn { from { opacity: 0; transform: scale(0.96) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; gap: 16px; }
.modal-title { font-size: 18px; font-weight: 600; }
.modal-close { background: none; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; padding: 4px; }
.modal-close:hover { color: var(--text-primary); }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 3px; }
.agent-row {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 18px;
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  margin-bottom: 10px;
  transition: all var(--transition-fast);
}
.agent-row:hover { border-color: var(--border-default); }
.agent-row .avatar {
  width: 40px; height: 40px; border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.agent-row .info { flex: 1; min-width: 0; }
.agent-row .name { font-size: 14px; font-weight: 600; }
.agent-row .meta {
  font-family: var(--font-mono); font-size: 11px;
  color: var(--text-muted); margin-top: 2px;
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.agent-row .actions { display: flex; gap: 6px; }
.memory-item {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border-subtle);
  transition: background var(--transition-fast);
}
.memory-item:hover { background: rgba(255,255,255,0.015); }
.memory-item:last-child { border-bottom: none; }
.memory-item .mem-type {
  font-family: var(--font-mono); font-size: 10px;
  text-transform: uppercase; letter-spacing: 0.5px;
  margin-bottom: 4px;
}
.memory-item .mem-content { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
.memory-item .mem-meta {
  font-family: var(--font-mono); font-size: 10.5px;
  color: var(--text-muted); margin-top: 6px;
  display: flex; gap: 12px; flex-wrap: wrap;
}
.mono { font-family: var(--font-mono); }
.muted { color: var(--text-muted); }
.secondary { color: var(--text-secondary); }
.hidden { display: none !important; }
.clickable { cursor: pointer; }
.toolbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
.toolbar-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
hr.divider { border: none; border-top: 1px solid var(--border-subtle); margin: 24px 0; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.tag {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 10.5px;
  background: var(--bg-hover);
  color: var(--text-muted);
  margin: 2px 2px 2px 0;
}
.toggle {
  position: relative;
  width: 38px;
  height: 20px;
  background: var(--bg-void);
  border-radius: 10px;
  border: 1px solid var(--border-default);
  cursor: pointer;
  transition: all var(--transition-fast);
  flex-shrink: 0;
}
.toggle.on { background: var(--accent-green-dim); border-color: var(--accent-green); }
.toggle::after {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--text-muted);
  transition: all var(--transition-fast);
}
.toggle.on::after { left: 20px; background: var(--accent-green); }
.section-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; }
.empty-state {
  padding: 40px 24px;
  background: var(--bg-surface);
  border: 1px dashed var(--border-default);
  border-radius: var(--radius-lg);
  text-align: center;
}
.empty-state h3 { font-size: 17px; margin-bottom: 8px; }
.empty-state p { color: var(--text-secondary); line-height: 1.6; max-width: 560px; margin: 0 auto; }
.empty-state .icon { font-size: 28px; margin-bottom: 12px; }
.spinner-wrap { min-height: 220px; display: flex; align-items: center; justify-content: center; }
.spinner {
  width: 28px; height: 28px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.08);
  border-top-color: var(--accent-green);
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.detail-hero {
  background: linear-gradient(180deg, rgba(99,210,151,0.10), rgba(91,156,245,0.05));
  border: 1px solid var(--border-active);
}
.detail-meta { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; color: var(--text-muted); font-family: var(--font-mono); font-size: 11px; }
.tab-bar {
  display: flex; gap: 4px; flex-wrap: wrap;
  margin-bottom: 20px;
  border-bottom: 1px solid var(--border-subtle);
  padding-bottom: 10px;
}
.tab-btn {
  padding: 8px 14px;
  border: 1px solid transparent;
  border-radius: 999px;
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--transition-fast);
  font-size: 12px;
  font-family: var(--font-mono);
}
.tab-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.tab-btn.active { background: var(--accent-green-dim); border-color: var(--border-active); color: var(--text-primary); }
.mini-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--text-muted); font-family: var(--font-mono); }
.session-filter-bar {
  position: sticky; top: 0; z-index: 5;
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  padding: 12px 16px;
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
  background: rgba(13,15,20,0.92);
  backdrop-filter: blur(10px);
  margin-bottom: 12px;
}
.filter-chip {
  padding: 6px 10px;
  border: 1px solid var(--border-default);
  border-radius: 999px;
  background: var(--bg-elevated);
  color: var(--text-secondary);
  cursor: pointer;
  transition: all var(--transition-fast);
  font-family: var(--font-mono);
  font-size: 11px;
}
.filter-chip.active.user { background: var(--accent-blue-dim); border-color: rgba(91,156,245,0.35); color: var(--accent-blue); }
.filter-chip.active.assistant { background: var(--accent-green-dim); border-color: rgba(99,210,151,0.35); color: var(--accent-green); }
.filter-chip.active.tool { background: var(--accent-amber-dim); border-color: rgba(229,168,75,0.35); color: var(--accent-amber); }
.filter-chip.active.system { background: rgba(255,255,255,0.06); border-color: var(--border-default); color: var(--text-primary); }
.filter-chip.active.purple { background: var(--accent-purple-dim); border-color: rgba(167,139,250,0.35); color: var(--accent-purple); }
.timeline { display: flex; flex-direction: column; gap: 10px; }
.timeline-marker { display: flex; align-items: center; gap: 10px; font-size: 11px; font-family: var(--font-mono); color: var(--text-muted); padding: 4px 0; }
.timeline-marker .line { flex: 1; border-top: 1px dashed var(--border-default); }
.message-card { padding: 14px 16px; border-radius: var(--radius-md); border: 1px solid var(--border-subtle); background: var(--bg-surface); }

function integrationStatusMeta(status) {

  if (status === 'expired') return { cls: 'pill-amber', label: '⚠ Expired' };
  if (status === 'error') return { cls: 'pill-amber', label: '⚠ Error' };
  if (status === 'configured') return { cls: 'pill-blue', label: '◉ Configured' };
  if (status === 'disabled') return { cls: 'pill-muted', label: '○ Disabled' };
  if (status === 'not_configured') return { cls: 'pill-muted', label: '○ Not configured' };
  return { cls: 'pill-muted', label: `○ ${String(status || 'Unknown').replace(/_/g, ' ')}` };
}

async function startIntegrationAuth(id) {
