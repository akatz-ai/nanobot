<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nanobot — Memory Audit Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        bg: { 900: '#0a0a0f', 800: '#12121a', 700: '#1a1a26', 600: '#22222e' },
        accent: { 500: '#6366f1', 400: '#818cf8', 300: '#a5b4fc' },
        surface: { 800: '#16161f', 700: '#1e1e2a', 600: '#282836' },
      },
      fontFamily: {
        mono: ['"JetBrains Mono"', '"Fira Code"', 'ui-monospace', 'monospace'],
      }
    }
  }
}
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: #e2e8f0; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: #12121a; }
  ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #555; }
  .markdown-body { line-height: 1.7; }
  .markdown-body h1 { font-size: 1.5rem; font-weight: 700; margin: 1.2rem 0 0.6rem; color: #a5b4fc; border-bottom: 1px solid #282836; padding-bottom: 0.4rem; }
  .markdown-body h2 { font-size: 1.2rem; font-weight: 600; margin: 1rem 0 0.5rem; color: #818cf8; }
  .markdown-body h3 { font-size: 1.05rem; font-weight: 600; margin: 0.8rem 0 0.4rem; color: #94a3b8; }
  .markdown-body p { margin: 0.4rem 0; }
  .markdown-body ul, .markdown-body ol { margin: 0.4rem 0; padding-left: 1.5rem; }
  .markdown-body li { margin: 0.2rem 0; }
  .markdown-body code { background: #1e1e2a; padding: 0.15rem 0.4rem; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 0.85em; color: #c4b5fd; }
  .markdown-body pre { background: #12121a; border: 1px solid #282836; border-radius: 6px; padding: 0.8rem; overflow-x: auto; margin: 0.6rem 0; }
  .markdown-body pre code { background: none; padding: 0; color: #e2e8f0; }
  .markdown-body strong { color: #f1f5f9; }
  .markdown-body a { color: #818cf8; text-decoration: underline; }
  .markdown-body blockquote { border-left: 3px solid #6366f1; padding-left: 1rem; color: #94a3b8; margin: 0.6rem 0; }
  .markdown-body table { border-collapse: collapse; width: 100%; margin: 0.6rem 0; }
  .markdown-body th, .markdown-body td { border: 1px solid #282836; padding: 0.4rem 0.8rem; text-align: left; }
  .markdown-body th { background: #1a1a26; color: #a5b4fc; font-weight: 600; }
  .tab-btn { transition: all 0.15s; }
  .tab-btn.active { color: #818cf8; border-color: #6366f1; }
  .fade-in { animation: fadeIn 0.2s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  .spinner { border: 2px solid #282836; border-top-color: #6366f1; border-radius: 50%; width: 20px; height: 20px; animation: spin 0.6s linear infinite; display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .budget-bar { height: 6px; border-radius: 3px; transition: width 0.4s ease; }
  .msg-system { border-left: 3px solid #64748b; background: #16161f; }
  .msg-user { border-left: 3px solid #3b82f6; background: #0f172a; }
  .msg-assistant { border-left: 3px solid #22c55e; background: #0a1a0f; }
  .msg-tool { border-left: 3px solid #f59e0b; background: #1a1400; }
  .collapsible-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
  .collapsible-content.open { max-height: 100000px; }
  .consolidation-marker { border-top: 2px dashed #f59e0b; margin: 0.5rem 0; padding-top: 0.5rem; }
  .compaction-bar { letter-spacing: 0.05em; }
</style>
</head>
<body class="min-h-screen">

<!-- Top nav -->
<header class="sticky top-0 z-50 bg-bg-900/95 backdrop-blur border-b border-surface-600">
  <div class="max-w-[1600px] mx-auto px-4 h-12 flex items-center gap-4">
    <div class="flex items-center gap-2">
      <div class="w-2 h-2 rounded-full bg-accent-500 animate-pulse"></div>
      <span class="font-semibold text-sm tracking-wide text-slate-200">NANOBOT</span>
      <span class="text-xs text-slate-500 ml-1">Memory Audit</span>
    </div>
    <nav id="breadcrumbs" class="flex items-center gap-1 text-xs text-slate-500 ml-4"></nav>
    <div class="ml-auto flex items-center gap-3">
      <span id="status-dot" class="text-xs text-slate-600"></span>
    </div>
  </div>
</header>

<!-- Main content -->
<main id="app" class="max-w-[1600px] mx-auto px-4 py-6">
  <div class="spinner mx-auto mt-20"></div>
</main>

<script>
// ---------------------------------------------------------------------------
// State & Router
// ---------------------------------------------------------------------------
const state = { view: 'agents', agent: null, tab: 'memory', sessionKey: null, graphTab: 'browse' };
const API = '';

function navigate(view, params = {}) {
  Object.assign(state, { view, ...params });
  render();
}

async function api(path, opts) {
  const res = await fetch(API + path, opts);
  if (!res.ok) throw new Error(`API ${res.status}: ${await res.text()}`);
  return res.json();
}

function html(tag, attrs = {}, children = []) {
  const el = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'className') el.className = v;
    else if (k === 'innerHTML') el.innerHTML = v;
    else if (k.startsWith('on')) el.addEventListener(k.slice(2).toLowerCase(), v);
    else el.setAttribute(k, v);
  }
  for (const c of (Array.isArray(children) ? children : [children])) {
    if (typeof c === 'string') el.appendChild(document.createTextNode(c));
    else if (c) el.appendChild(c);
  }
  return el;
}

function md(text) { return marked.parse(text || '', { breaks: true }); }
function truncate(s, n = 80) { return s && s.length > n ? s.slice(0, n) + '…' : s || ''; }
function fmtDate(iso) { if (!iso) return '—'; try { return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }); } catch { return iso; } }
function fmtBytes(n) { if (n < 1024) return n + ' B'; if (n < 1048576) return (n/1024).toFixed(1) + ' KB'; return (n/1048576).toFixed(1) + ' MB'; }
function fmtMs(ms) { if (!ms) return '—'; return new Date(ms).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }
function $(sel) { return document.querySelector(sel); }

function setBreadcrumbs(...parts) {
  const bc = $('#breadcrumbs');
  bc.innerHTML = '';
  parts.forEach((p, i) => {
    if (i > 0) bc.appendChild(html('span', { className: 'text-slate-600 mx-1' }, '/'));
    if (p.onClick) {
      const a = html('span', { className: 'cursor-pointer hover:text-accent-400 transition-colors', onClick: p.onClick }, p.label);
      bc.appendChild(a);
    } else {
      bc.appendChild(html('span', { className: 'text-slate-400' }, p.label));
    }
  });
}

// ---------------------------------------------------------------------------
// Render dispatcher
// ---------------------------------------------------------------------------
function render() {
  const app = $('#app');
  app.innerHTML = '<div class="flex justify-center mt-20"><div class="spinner"></div></div>';
  switch (state.view) {
    case 'agents': renderAgents(); break;
    case 'agent-detail': renderAgentDetail(); break;
    case 'session': renderSession(); break;
    case 'graph': renderGraph(); break;
  }
}

// ---------------------------------------------------------------------------
// 1. Agent Overview
// ---------------------------------------------------------------------------
async function renderAgents() {
  setBreadcrumbs({ label: 'Agents' });
  const data = await api('/api/agents');
  const app = $('#app');
  app.innerHTML = '';

  // Header
  const hdr = html('div', { className: 'flex items-center justify-between mb-6' }, [
    html('div', {}, [
      html('h1', { className: 'text-xl font-semibold text-slate-100' }, 'Agent Overview'),
      html('p', { className: 'text-sm text-slate-500 mt-1' }, `${data.agents.length} registered agents`),
    ]),
    html('button', { className: 'px-3 py-1.5 text-xs bg-surface-700 hover:bg-surface-600 rounded-md border border-surface-600 text-slate-300 transition-colors', onClick: () => navigate('graph', { graphTab: 'browse' }) }, 'Graph Explorer →'),
  ]);
  app.appendChild(hdr);

  // Card grid
  const grid = html('div', { className: 'grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 fade-in' });
  for (const a of data.agents) {
    const memPct = Math.min(a.memoryChars / 16000 * 100, 100);
    const memColor = memPct > 90 ? '#ef4444' : memPct > 70 ? '#f59e0b' : '#22c55e';
    const card = html('div', {
      className: 'bg-surface-800 border border-surface-600 rounded-lg p-5 hover:border-accent-500/40 cursor-pointer transition-all group',
      onClick: () => navigate('agent-detail', { agent: a.name, tab: 'memory' }),
    }, [
      html('div', { className: 'flex items-center justify-between mb-3' }, [
        html('div', { className: 'flex items-center gap-2' }, [
          html('div', { className: 'w-8 h-8 rounded-lg bg-accent-500/10 flex items-center justify-center text-accent-400 font-mono text-sm font-bold' }, a.name[0].toUpperCase()),
          html('div', {}, [
            html('h3', { className: 'font-semibold text-slate-200 group-hover:text-accent-300 transition-colors' }, a.name),
            html('p', { className: 'text-xs text-slate-500 font-mono' }, truncate(a.model || 'default', 30)),
          ]),
        ]),
      ]),
      html('div', { className: 'grid grid-cols-3 gap-3 text-center mt-3' }, [
        html('div', { className: 'bg-bg-800 rounded-md p-2' }, [
          html('div', { className: 'text-lg font-semibold text-slate-200' }, String(a.sessionCount)),
          html('div', { className: 'text-[10px] text-slate-500 uppercase tracking-wider' }, 'Sessions'),
        ]),
        html('div', { className: 'bg-bg-800 rounded-md p-2' }, [
          html('div', { className: 'text-lg font-semibold text-slate-200' }, String(a.messageCount)),
          html('div', { className: 'text-[10px] text-slate-500 uppercase tracking-wider' }, 'Messages'),
        ]),
        html('div', { className: 'bg-bg-800 rounded-md p-2' }, [
          html('div', { className: 'text-lg font-semibold text-slate-200' }, String(a.historyFileCount)),
          html('div', { className: 'text-[10px] text-slate-500 uppercase tracking-wider' }, 'History'),
        ]),
      ]),
      // Memory budget bar
      html('div', { className: 'mt-3' }, [
        html('div', { className: 'flex justify-between text-[10px] text-slate-500 mb-1' }, [
          html('span', {}, 'MEMORY.md'),
          html('span', {}, `${(a.memoryChars/1000).toFixed(1)}K / 16K chars`),
        ]),
        html('div', { className: 'w-full h-1.5 bg-bg-900 rounded-full overflow-hidden' }, [
          html('div', { className: 'budget-bar', style: `width:${memPct}%;background:${memColor}` }),
        ]),
      ]),
    ]);
    grid.appendChild(card);
  }
  app.appendChild(grid);
}

// ---------------------------------------------------------------------------
// 2. Agent Detail (tabs: Memory, Sessions, Identity)
// ---------------------------------------------------------------------------
async function renderAgentDetail() {
  const name = state.agent;
  setBreadcrumbs(
    { label: 'Agents', onClick: () => navigate('agents') },
    { label: name },
  );
  const app = $('#app');
  app.innerHTML = '';

  // Tab bar
  const tabs = ['memory', 'sessions', 'compaction', 'identity'];
  const tabBar = html('div', { className: 'flex gap-1 border-b border-surface-600 mb-5' });
  for (const t of tabs) {
    const btn = html('button', {
      className: `tab-btn px-4 py-2 text-sm font-medium border-b-2 ${state.tab === t ? 'active text-accent-400 border-accent-500' : 'text-slate-500 border-transparent hover:text-slate-300'}`,
      onClick: () => { state.tab = t; renderAgentDetail(); },
    }, t.charAt(0).toUpperCase() + t.slice(1));
    tabBar.appendChild(btn);
  }
  app.appendChild(tabBar);

  const content = html('div', { className: 'fade-in' });
  app.appendChild(content);

  if (state.tab === 'memory') await renderMemoryTab(name, content);
  else if (state.tab === 'sessions') await renderSessionsTab(name, content);
  else if (state.tab === 'compaction') await renderCompactionTab(name, content);
  else if (state.tab === 'identity') await renderIdentityTab(name, content);
}

// --- Memory Tab ---
async function renderMemoryTab(name, container) {
  const [memData, histData] = await Promise.all([
    api(`/api/agents/${name}/memory`),
    api(`/api/agents/${name}/history`),
  ]);

  // Budget card
  const budgetPct = memData.budgetCharPercent;
  const budgetColor = budgetPct > 90 ? '#ef4444' : budgetPct > 70 ? '#f59e0b' : '#22c55e';
  const stats = html('div', { className: 'grid grid-cols-4 gap-3 mb-5' });
  [
    { label: 'Characters', value: memData.chars.toLocaleString() },
    { label: 'Est. Tokens', value: memData.tokens.toLocaleString() },
    { label: 'Char Budget', value: `${budgetPct}%` },
    { label: 'Token Budget', value: `${memData.budgetTokenPercent}%` },
  ].forEach(s => {
    stats.appendChild(html('div', { className: 'bg-surface-800 border border-surface-600 rounded-md p-3 text-center' }, [
      html('div', { className: 'text-xl font-semibold text-slate-200' }, s.value),
      html('div', { className: 'text-[10px] text-slate-500 uppercase tracking-wider mt-1' }, s.label),
    ]));
  });
  container.appendChild(stats);

  // Budget bar
  const barWrap = html('div', { className: 'mb-5' }, [
    html('div', { className: 'w-full h-2 bg-bg-900 rounded-full overflow-hidden' }, [
      html('div', { className: 'budget-bar', style: `width:${Math.min(budgetPct,100)}%;background:${budgetColor}` }),
    ]),
  ]);
  container.appendChild(barWrap);

  // Two columns: MEMORY.md | History
  const cols = html('div', { className: 'grid grid-cols-1 lg:grid-cols-3 gap-5' });

  // Memory content
  const memCard = html('div', { className: 'lg:col-span-2 bg-surface-800 border border-surface-600 rounded-lg overflow-hidden' }, [
    html('div', { className: 'px-4 py-3 border-b border-surface-600 flex justify-between items-center' }, [
      html('h3', { className: 'text-sm font-semibold text-slate-300' }, 'MEMORY.md'),
      html('span', { className: 'text-xs text-slate-500 font-mono' }, `${memData.chars} chars`),
    ]),
    html('div', { className: 'p-4 max-h-[70vh] overflow-y-auto markdown-body', innerHTML: md(memData.content) }),
  ]);
  cols.appendChild(memCard);

  // History sidebar
  const histCard = html('div', { className: 'bg-surface-800 border border-surface-600 rounded-lg overflow-hidden' }, [
    html('div', { className: 'px-4 py-3 border-b border-surface-600' }, [
      html('h3', { className: 'text-sm font-semibold text-slate-300' }, `History (${histData.files.length} files)`),
    ]),
  ]);
  const histList = html('div', { className: 'max-h-[70vh] overflow-y-auto divide-y divide-surface-600' });
  const histContent = html('div', { id: 'hist-content', className: 'hidden' });

  for (const f of histData.files) {
    const item = html('div', {
      className: 'px-4 py-2.5 hover:bg-surface-700 cursor-pointer transition-colors flex justify-between items-center',
      onClick: async () => {
        const d = await api(`/api/agents/${name}/history/${f.date}`);
        histContent.className = 'p-4 border-t border-surface-600 max-h-96 overflow-y-auto markdown-body';
        histContent.innerHTML = `<div class="text-xs text-slate-500 mb-2 font-mono">${f.date}</div>` + md(d.content);
      },
    }, [
      html('span', { className: 'text-sm text-slate-300 font-mono' }, f.date),
      html('span', { className: 'text-xs text-slate-500' }, fmtBytes(f.size)),
    ]);
    histList.appendChild(item);
  }
  histCard.appendChild(histList);
  histCard.appendChild(histContent);
  cols.appendChild(histCard);

  container.appendChild(cols);
}

// --- Sessions Tab ---
async function renderSessionsTab(name, container) {
  const data = await api(`/api/agents/${name}/sessions`);

  const table = html('div', { className: 'bg-surface-800 border border-surface-600 rounded-lg overflow-hidden' });
  const thead = html('div', { className: 'grid grid-cols-6 gap-2 px-4 py-2.5 text-[10px] uppercase tracking-wider text-slate-500 border-b border-surface-600 font-semibold' });
  ['Key', 'Messages', 'Consolidated', 'Created', 'Updated', 'Size'].forEach(h => thead.appendChild(html('div', {}, h)));
  table.appendChild(thead);

  const tbody = html('div', { className: 'divide-y divide-surface-600/50 max-h-[70vh] overflow-y-auto' });
  for (const s of data.sessions) {
    const row = html('div', {
      className: 'grid grid-cols-6 gap-2 px-4 py-2.5 hover:bg-surface-700 cursor-pointer transition-colors items-center',
      onClick: () => navigate('session', { agent: name, sessionKey: s.file.replace('.jsonl', '') }),
    }, [
      html('div', { className: 'text-sm text-accent-300 font-mono truncate', title: s.key }, truncate(s.key, 35)),
      html('div', { className: 'text-sm text-slate-300' }, String(s.messageCount)),
      html('div', { className: 'text-sm text-slate-400' }, `${s.lastConsolidated || 0}`),
      html('div', { className: 'text-xs text-slate-500' }, fmtDate(s.createdAt)),
      html('div', { className: 'text-xs text-slate-500' }, fmtDate(s.updatedAt)),
      html('div', { className: 'text-xs text-slate-500 font-mono' }, fmtBytes(s.size || 0)),
    ]);
    tbody.appendChild(row);
  }
  table.appendChild(tbody);
  container.appendChild(table);
}

// --- Identity Tab ---
async function renderIdentityTab(name, container) {
  const data = await api(`/api/agents/${name}/identity`);

  const sections = [
    { label: 'IDENTITY.md', content: data.identity },
    { label: 'SOUL.md', content: data.soul },
    { label: 'USER.md', content: data.user },
  ];

  for (const s of sections) {
    if (!s.content) continue;
    const card = html('div', { className: 'bg-surface-800 border border-surface-600 rounded-lg overflow-hidden mb-4' }, [
      html('div', { className: 'px-4 py-3 border-b border-surface-600 flex justify-between items-center cursor-pointer', onClick: (e) => {
        const body = e.currentTarget.nextElementSibling;
        body.classList.toggle('open');
      }}, [
        html('h3', { className: 'text-sm font-semibold text-slate-300' }, s.label),
        html('span', { className: 'text-xs text-slate-500' }, `${s.content.length} chars`),
      ]),
      html('div', { className: 'collapsible-content open' }, [
        html('div', { className: 'p-4 max-h-[60vh] overflow-y-auto markdown-body', innerHTML: md(s.content) }),
      ]),
    ]);
    container.appendChild(card);
  }
}

// --- Compaction Tab ---
async function renderCompactionTab(name, container) {
  const data = await api(`/api/agents/${name}/compaction`);

  if (!data.events || data.events.length === 0) {
    container.appendChild(html('div', { className: 'bg-surface-800 border border-surface-600 rounded-lg p-8 text-center' }, [
      html('div', { className: 'text-3xl mb-3' }, '🔄'),
      html('h3', { className: 'text-lg font-semibold text-slate-300 mb-2' }, 'No Compaction Events'),
      html('p', { className: 'text-sm text-slate-500' }, 'Compaction events will appear here once the session context exceeds the token threshold.'),
    ]));
    return;
  }

  // Summary cards
  const totalEvents = data.events.length;
  const successCount = data.events.filter(e => e.result?.success).length;
  const failCount = totalEvents - successCount;
  const totalItems = data.events.reduce((sum, e) => sum + (e.result?.total_items || 0), 0);
  const totalBatches = data.events.reduce((sum, e) => sum + (e.result?.total_batches || 0), 0);
  const avgDuration = Math.round(data.events.reduce((sum, e) => sum + (e.result?.total_duration_ms || 0), 0) / totalEvents);

  const stats = html('div', { className: 'grid grid-cols-2 md:grid-cols-5 gap-3 mb-5' });
  [
    { label: 'Total Events', value: totalEvents, color: 'text-slate-200' },
    { label: 'Successful', value: successCount, color: 'text-green-400' },
    { label: 'Failed', value: failCount, color: failCount > 0 ? 'text-red-400' : 'text-slate-400' },
    { label: 'Items Extracted', value: totalItems, color: 'text-cyan-400' },
    { label: 'Avg Duration', value: _fmtDuration(avgDuration), color: 'text-slate-300' },
  ].forEach(s => {
    stats.appendChild(html('div', { className: 'bg-surface-800 border border-surface-600 rounded-md p-3 text-center' }, [
      html('div', { className: `text-xl font-semibold ${s.color}` }, String(s.value)),
      html('div', { className: 'text-[10px] text-slate-500 uppercase tracking-wider mt-1' }, s.label),
    ]));
  });
  container.appendChild(stats);

  // Event list
  for (const event of data.events) {
    container.appendChild(_buildCompactionEventCard(event));
  }
}

function _fmtDuration(ms) {
  if (!ms || ms === 0) return '—';
  if (ms >= 60000) return `${(ms / 60000).toFixed(1)}m`;
  if (ms >= 1000) return `${(ms / 1000).toFixed(1)}s`;
  return `${ms}ms`;
}

function _fmtTokens(n) {
  if (!n) return '0';
  if (n >= 1000000) return `${(n / 1000000).toFixed(1)}M`;
  if (n >= 1000) return `${(n / 1000).toFixed(0)}k`;
  return String(n);
}

function _progressBar(pct, width = 20) {
  pct = Math.max(0, Math.min(1, pct));
  const filled = Math.round(pct * width);
  return '█'.repeat(filled) + '░'.repeat(width - filled);
}

function _buildCompactionEventCard(event) {
  const trigger = event.trigger || {};
  const pre = event.pre_context || {};
  const batches = event.batches || [];
  const post = event.post_context || {};
  const result = event.result || {};

  const success = result.success;
  const borderColor = success ? 'border-green-500/30' : 'border-red-500/30';
  const statusEmoji = success ? '✅' : '❌';
  const statusBg = success ? 'bg-green-950/20' : 'bg-red-950/20';

  const ts = event.timestamp || '';
  const tsDisplay = ts ? new Date(ts).toLocaleString() : 'unknown';
  const sessionKey = event.session_key || event._session_file || '—';

  const card = html('div', { className: `bg-surface-800 border ${borderColor} rounded-lg overflow-hidden mb-4` });

  // Header
  const header = html('div', {
    className: `px-4 py-3 border-b border-surface-600 flex items-center gap-3 cursor-pointer ${statusBg} hover:brightness-110 transition-all`,
    onClick: () => { body.classList.toggle('hidden'); arrow.textContent = body.classList.contains('hidden') ? '▶' : '▼'; },
  });
  header.appendChild(html('span', { className: 'text-sm' }, statusEmoji));
  header.appendChild(html('span', { className: 'text-sm font-semibold text-slate-200' }, tsDisplay));
  header.appendChild(html('span', { className: 'text-xs text-slate-500 font-mono' }, sessionKey));

  // Trigger summary in header
  const utilPct = trigger.utilization_pct || 0;
  const triggerChip = html('span', { className: 'ml-auto text-xs font-mono text-slate-400' },
    `${_fmtTokens(trigger.input_tokens)}/${_fmtTokens(trigger.context_window)} (${utilPct.toFixed(0)}%)`
  );
  header.appendChild(triggerChip);

  if (result.total_duration_ms) {
    header.appendChild(html('span', { className: 'text-xs text-slate-500' }, _fmtDuration(result.total_duration_ms)));
  }
  const arrow = html('span', { className: 'text-xs text-slate-500 ml-2' }, '▶');
  header.appendChild(arrow);
  card.appendChild(header);

  // Body (collapsed by default)
  const body = html('div', { className: 'hidden' });

  // ── Trigger section ──
  const triggerSection = html('div', { className: 'px-4 py-3 border-b border-surface-600/50' });
  triggerSection.appendChild(html('div', { className: 'text-[10px] font-semibold text-slate-400 uppercase tracking-wider mb-2' }, '⚡ Trigger'));

  const utilBar = _progressBar(utilPct / 100);
  triggerSection.appendChild(html('div', { className: 'font-mono text-xs text-slate-300 mb-1' },
    `Context: ${utilBar} ${utilPct.toFixed(1)}% (${_fmtTokens(trigger.input_tokens)} / ${_fmtTokens(trigger.context_window)})`
  ));
  triggerSection.appendChild(html('div', { className: 'text-xs text-slate-500' },
    `Threshold: ${_fmtTokens(trigger.threshold)} · Messages: ${trigger.total_messages || 0} · Consolidated: ${trigger.last_consolidated || 0}`
  ));
  body.appendChild(triggerSection);

  // ── Pre-compaction context ──
  if (pre && Object.keys(pre).length > 0) {
    const preSection = html('div', { className: 'px-4 py-3 border-b border-surface-600/50' });
    preSection.appendChild(html('div', { className: 'text-[10px] font-semibold text-slate-400 uppercase tracking-wider mb-2' }, '📋 Pre-Compaction Context'));

    const preGrid = html('div', { className: 'grid grid-cols-2 md:grid-cols-3 gap-2' });
    [
      { label: 'System Prompt', value: `${(pre.system_prompt_chars || 0).toLocaleString()}c` },
      { label: 'MEMORY.md', value: `${(pre.memory_md_chars || 0).toLocaleString()}c` },
      { label: 'Conversation', value: `${pre.conversation_messages || 0} msgs (from idx ${pre.conversation_start_index || 0})` },
      { label: 'History', value: `${(pre.history_chars || 0).toLocaleString()}c` },
    ].forEach(item => {
      preGrid.appendChild(html('div', { className: 'text-xs' }, [
        html('span', { className: 'text-slate-500' }, item.label + ': '),
        html('span', { className: 'text-slate-300 font-mono' }, item.value),
      ]));
    });
    preSection.appendChild(preGrid);
    body.appendChild(preSection);
  }

  // ── Batches ──
  if (batches.length > 0) {
    const batchSection = html('div', { className: 'px-4 py-3 border-b border-surface-600/50' });
    const okBatches = batches.filter(b => b.success).length;
    const totalItems = batches.reduce((s, b) => s + (b.items_extracted || 0), 0);
    batchSection.appendChild(html('div', { className: 'text-[10px] font-semibold text-slate-400 uppercase tracking-wider mb-2' },
      `🔬 Extraction Batches — ${okBatches}/${batches.length} succeeded · ${totalItems} items`
    ));

    for (const b of batches) {
      const bOk = b.success;
      const bEmoji = bOk ? '✅' : '❌';
      const bBorder = bOk ? 'border-green-500/20' : 'border-red-500/20';
      const bBg = bOk ? 'bg-green-950/10' : 'bg-red-950/10';
      const [bStart, bEnd] = b.msg_range || [0, 0];

      const batchEl = html('div', { className: `${bBg} border ${bBorder} rounded-md p-3 mb-2` });

      // Batch header
      batchEl.appendChild(html('div', { className: 'flex items-center gap-2 flex-wrap' }, [
        html('span', { className: 'text-xs' }, bEmoji),
        html('span', { className: 'text-xs font-semibold text-slate-300' }, `Batch ${b.batch_index}`),
        html('span', { className: 'text-xs text-slate-500 font-mono' }, `msgs[${bStart}:${bEnd}]`),
        html('span', { className: 'text-xs text-slate-500' }, `→ ${b.items_extracted || 0} items`),
        html('span', { className: 'text-xs text-slate-600' }, _fmtDuration(b.duration_ms)),
        html('span', { className: 'text-xs text-slate-600 font-mono' },
          `transcript: ${_fmtTokens(b.transcript_chars)}c · response: ${_fmtTokens(b.llm_response_chars)}c`
        ),
      ]));

      // Error message
      if (b.error && !bOk) {
        batchEl.appendChild(html('div', { className: 'mt-2 text-xs text-red-400 bg-red-950/30 rounded px-2 py-1 font-mono' }, b.error));
      }

      // LLM response preview (show for failed or empty batches)
      if (b.llm_response_preview && (!bOk || b.items_extracted === 0)) {
        const previewEl = html('pre', {
          className: 'hidden mt-2 text-xs text-slate-400 whitespace-pre-wrap break-words max-h-40 overflow-y-auto bg-bg-900/50 rounded p-2',
        }, b.llm_response_preview);
        const toggleBtn = html('button', {
          className: 'text-[10px] text-accent-400 hover:text-accent-300 mt-1',
          onClick: () => {
            previewEl.classList.toggle('hidden');
            toggleBtn.textContent = previewEl.classList.contains('hidden') ? 'Show LLM response' : 'Hide LLM response';
          },
        }, 'Show LLM response');
        batchEl.appendChild(toggleBtn);
        batchEl.appendChild(previewEl);
      }

      // Successful batch with preview
      if (b.llm_response_preview && bOk && b.items_extracted > 0) {
        const previewEl = html('pre', {
          className: 'hidden mt-2 text-xs text-slate-400 whitespace-pre-wrap break-words max-h-40 overflow-y-auto bg-bg-900/50 rounded p-2',
        }, b.llm_response_preview);
        const toggleBtn = html('button', {
          className: 'text-[10px] text-accent-400 hover:text-accent-300 mt-1',
          onClick: () => {
            previewEl.classList.toggle('hidden');
            toggleBtn.textContent = previewEl.classList.contains('hidden') ? 'Show LLM response' : 'Hide LLM response';
          },
        }, 'Show LLM response');
        batchEl.appendChild(toggleBtn);
        batchEl.appendChild(previewEl);
      }

      batchSection.appendChild(batchEl);
    }
    body.appendChild(batchSection);
  }

  // ── Post-compaction context ──
  if (post && Object.keys(post).length > 0 && success) {
    const postSection = html('div', { className: 'px-4 py-3 border-b border-surface-600/50' });
    postSection.appendChild(html('div', { className: 'text-[10px] font-semibold text-slate-400 uppercase tracking-wider mb-2' }, '📍 Post-Compaction Context'));

    const postGrid = html('div', { className: 'grid grid-cols-2 md:grid-cols-3 gap-2' });
    [
      { label: 'First Kept Index', value: post.first_kept_index },
      { label: 'New Consolidated', value: post.new_last_consolidated },
      { label: 'Visible Messages', value: `${post.visible_messages || 0} (keep=${post.keep_count || 25})` },
      { label: 'Items Extracted', value: post.total_items_extracted || 0 },
      { label: 'History File', value: post.history_file || '—' },
    ].forEach(item => {
      postGrid.appendChild(html('div', { className: 'text-xs' }, [
        html('span', { className: 'text-slate-500' }, item.label + ': '),
        html('span', { className: 'text-slate-300 font-mono' }, String(item.value)),
      ]));
    });
    postSection.appendChild(postGrid);
    body.appendChild(postSection);
  }

  // ── Result / Error ──
  if (!success && result.error) {
    const errSection = html('div', { className: 'px-4 py-3 bg-red-950/20' });
    errSection.appendChild(html('div', { className: 'text-[10px] font-semibold text-red-400 uppercase tracking-wider mb-1' }, '⚠️ Error'));
    errSection.appendChild(html('div', { className: 'text-xs text-red-300 font-mono' }, result.error));
    body.appendChild(errSection);
  }

  card.appendChild(body);
  return card;
}

// Label display names and colors for context log entries
const CTX_LABEL_META = {
  system_prompt:      { name: 'System Prompt',      color: 'text-purple-400', icon: '📋' },
  session_info:       { name: 'Session Info',       color: 'text-slate-400',  icon: '🔗' },
  long_term_memory:   { name: 'Long-term Memory',   color: 'text-cyan-400',   icon: '🧠' },
  daily_history:      { name: 'Daily History',      color: 'text-teal-400',   icon: '📅' },
  compaction_summary: { name: 'Compaction Summary', color: 'text-indigo-400', icon: '🗜️' },
  retrieved_memory:   { name: 'Retrieved Memory',   color: 'text-pink-400',   icon: '🔍' },
  resume_notice:      { name: 'Resume Notice',      color: 'text-amber-400',  icon: '⚡' },
  other:              { name: 'Other',              color: 'text-slate-500',  icon: '•' },
};

function buildContextPanel(ctxEntry) {
  /**
   * Build a collapsible panel showing all injected system messages for a turn.
   * ctxEntry is one entry from the context log.
   */
  const panel = html('div', { className: 'mt-2 border border-purple-500/20 rounded-md bg-purple-950/10 overflow-hidden' });

  // Summary bar
  const sysMsgs = ctxEntry.system_messages || [];
  const labels = sysMsgs.map(s => s.label).filter(l => l !== 'system_prompt');
  const hasMem = ctxEntry.memory_context_raw ? true : false;
  const chips = [];
  if (hasMem) chips.push('🔍 Retrieved Memory');
  for (const l of labels) {
    const m = CTX_LABEL_META[l] || CTX_LABEL_META.other;
    chips.push(`${m.icon} ${m.name}`);
  }
  if (ctxEntry.tool_pruning && ctxEntry.tool_pruning.messages_pruned > 0) {
    const tp = ctxEntry.tool_pruning;
    chips.push(`✂️ ${tp.messages_pruned} pruned (~${(tp.tokens_saved / 1000).toFixed(1)}k saved)`);
  }
  const summaryText = chips.length ? chips.join(' · ') : 'System prompt only';

  const summaryBar = html('div', {
    className: 'flex items-center gap-2 px-3 py-2 cursor-pointer hover:bg-purple-900/20 transition-colors',
    onClick: () => { details.classList.toggle('hidden'); arrow.textContent = details.classList.contains('hidden') ? '▶' : '▼'; },
  }, [
    html('span', { className: 'text-purple-400 text-xs' }, '🧠'),
    html('span', { className: 'text-[10px] text-purple-300 font-semibold uppercase tracking-wider' }, 'LLM Context'),
    html('span', { className: 'text-[10px] text-slate-500 ml-1' }, `(${ctxEntry.total_messages} msgs · ~${(ctxEntry.total_chars / 1000).toFixed(1)}k chars)`),
    html('span', { className: 'text-[10px] text-slate-500 ml-auto flex-shrink-0' }, summaryText),
  ]);
  const arrow = html('span', { className: 'text-[10px] text-purple-400 ml-1 flex-shrink-0' }, '▶');
  summaryBar.appendChild(arrow);
  panel.appendChild(summaryBar);

  // Details (hidden by default)
  const details = html('div', { className: 'hidden border-t border-purple-500/20' });

  // System prompt section
  const promptHash = ctxEntry.system_prompt_hash || '?';
  const promptLen = ctxEntry.system_prompt_length || 0;
  const promptChanged = ctxEntry.system_prompt_changed;
  const promptSection = html('div', { className: 'px-3 py-2 border-b border-surface-700/50' });
  const promptHeader = html('div', { className: 'flex items-center gap-2' }, [
    html('span', { className: 'text-purple-400 text-xs' }, '📋'),
    html('span', { className: 'text-[10px] font-semibold text-purple-300 uppercase tracking-wider' }, 'System Prompt'),
    html('span', { className: 'text-[10px] text-slate-600 font-mono' }, `hash:${promptHash} · ${(promptLen / 1000).toFixed(1)}k chars`),
    promptChanged ? html('span', { className: 'text-[10px] text-amber-400 font-semibold' }, '(changed)') : null,
  ].filter(Boolean));
  promptSection.appendChild(promptHeader);

  if (ctxEntry.system_prompt_full) {
    const promptPre = html('pre', {
      className: 'hidden text-xs text-slate-400 mt-2 whitespace-pre-wrap break-words max-h-80 overflow-y-auto bg-bg-900/50 rounded p-2',
    }, ctxEntry.system_prompt_full);
    const promptToggle = html('button', {
      className: 'text-[10px] text-purple-400 hover:text-purple-300 mt-1',
      onClick: (e) => {
        e.stopPropagation();
        promptPre.classList.toggle('hidden');
        promptToggle.textContent = promptPre.classList.contains('hidden') ? 'Show full prompt' : 'Hide prompt';
      },
    }, 'Show full prompt');
    promptSection.appendChild(promptToggle);
    promptSection.appendChild(promptPre);
  }
  details.appendChild(promptSection);

  // Each injected system message (except the base prompt)
  for (const sm of sysMsgs) {
    if (sm.label === 'system_prompt') continue;
    const meta = CTX_LABEL_META[sm.label] || CTX_LABEL_META.other;
    const section = html('div', { className: 'px-3 py-2 border-b border-surface-700/50' });
    const msgChars = sm.char_count ?? sm.length ?? 0;
    section.appendChild(html('div', { className: 'flex items-center gap-2' }, [
      html('span', { className: `text-xs ${meta.color}` }, meta.icon),
      html('span', { className: `text-[10px] font-semibold ${meta.color} uppercase tracking-wider` }, meta.name),
      html('span', { className: 'text-[10px] text-slate-600' }, `${(msgChars / 1000).toFixed(1)}k chars`),
    ]));
    if (sm.content) {
      const contentPre = html('pre', {
        className: 'hidden text-xs text-slate-400 mt-2 whitespace-pre-wrap break-words max-h-60 overflow-y-auto bg-bg-900/50 rounded p-2',
      }, sm.content);
      const toggle = html('button', {
        className: `text-[10px] ${meta.color} hover:brightness-125 mt-1`,
        onClick: (e) => {
          e.stopPropagation();
          contentPre.classList.toggle('hidden');
          toggle.textContent = contentPre.classList.contains('hidden') ? 'Show content' : 'Hide content';
        },
      }, 'Show content');
      section.appendChild(toggle);
      section.appendChild(contentPre);
    }
    details.appendChild(section);
  }

  // Raw retrieved memory (the unformatted string before injection)
  if (ctxEntry.memory_context_raw) {
    const memSection = html('div', { className: 'px-3 py-2 border-b border-surface-700/50' });
    memSection.appendChild(html('div', { className: 'flex items-center gap-2' }, [
      html('span', { className: 'text-xs text-pink-400' }, '🔍'),
      html('span', { className: 'text-[10px] font-semibold text-pink-300 uppercase tracking-wider' }, 'Raw Retrieved Memory (pre-format)'),
      html('span', { className: 'text-[10px] text-slate-600' }, `${ctxEntry.memory_context_raw.length} chars`),
    ]));
    const memPre = html('pre', {
      className: 'text-xs text-pink-200/70 mt-2 whitespace-pre-wrap break-words max-h-60 overflow-y-auto bg-bg-900/50 rounded p-2',
    }, ctxEntry.memory_context_raw);
    memSection.appendChild(memPre);
    details.appendChild(memSection);
  }

  // Resume notice
  if (ctxEntry.resume_notice) {
    const rSection = html('div', { className: 'px-3 py-2 border-b border-surface-700/50' });
    rSection.appendChild(html('div', { className: 'flex items-center gap-2' }, [
      html('span', { className: 'text-xs text-amber-400' }, '⚡'),
      html('span', { className: 'text-[10px] font-semibold text-amber-300 uppercase tracking-wider' }, 'Resume Notice'),
    ]));
    rSection.appendChild(html('pre', {
      className: 'text-xs text-amber-200/70 mt-1 whitespace-pre-wrap',
    }, ctxEntry.resume_notice));
    details.appendChild(rSection);
  }

  // Tool pruning stats
  if (ctxEntry.tool_pruning) {
    const tp = ctxEntry.tool_pruning;
    const pruneSection = html('div', { className: 'px-3 py-2' });
    const hasPruning = tp.messages_pruned > 0;
    const iconColor = hasPruning ? 'text-orange-400' : 'text-slate-500';
    const labelColor = hasPruning ? 'text-orange-300' : 'text-slate-500';
    const statusText = hasPruning
      ? `${tp.messages_pruned} pruned · ~${(tp.tokens_saved / 1000).toFixed(1)}k tokens saved`
      : 'No pruning needed';
    const detailText = `${tp.total_tool_messages} tool msgs total · ${tp.messages_protected} protected`;

    pruneSection.appendChild(html('div', { className: 'flex items-center gap-2 flex-wrap' }, [
      html('span', { className: `text-xs ${iconColor}` }, '✂️'),
      html('span', { className: `text-[10px] font-semibold ${labelColor} uppercase tracking-wider` }, 'Tool Pruning'),
      html('span', { className: `text-[10px] ${hasPruning ? 'text-orange-200/80' : 'text-slate-600'}` }, statusText),
      html('span', { className: 'text-[10px] text-slate-600' }, `· ${detailText}`),
    ]));
    details.appendChild(pruneSection);
  }

  panel.appendChild(details);
  return panel;
}

const SESSION_PAGE_SIZE = 100;

// Persistent filter state across re-renders within the same session
let sessionFilterState = {
  showUser: true,
  showAssistant: true,
  showTool: true,
  showSystem: true,
  llmView: false,
};

function _classifyRole(role) {
  if (role === 'user') return 'user';
  if (role === 'assistant') return 'assistant';
  if (role === 'tool') return 'tool';
  return 'system';
}

function _shouldShowMsg(msg) {
  const cat = _classifyRole(msg.role || 'system');
  return sessionFilterState['show' + cat.charAt(0).toUpperCase() + cat.slice(1)];
}

function buildConsolidationMarker(lastConsolidated) {
  const markerEl = html('div', { className: 'consolidation-marker' });
  markerEl.appendChild(html('div', { className: 'flex items-center gap-2 text-xs text-amber-400/80 py-1' }, [
    html('span', {}, `▲ Consolidated through message #${lastConsolidated}`),
    html('div', { className: 'flex-1 border-t border-dashed border-amber-500/30' }),
  ]));
  return markerEl;
}

function buildPromptWindowMarker(firstKeptIndex) {
  const markerEl = html('div', { className: 'my-1 prompt-window-marker' });
  markerEl.appendChild(html('div', { className: 'flex items-center gap-2 text-xs text-cyan-300/80 py-1' }, [
    html('span', {}, `▼ LLM prompt window starts at message #${firstKeptIndex}`),
    html('div', { className: 'flex-1 border-t border-dashed border-cyan-400/30' }),
  ]));
  return markerEl;
}

function buildCompactionSummaryCard(summary, firstKeptIndex) {
  const card = html('div', {
    className: 'msg-system rounded-md px-4 py-3 border border-indigo-500/40 bg-indigo-950/20 mb-2',
    'data-role': 'system',
    'data-msg-type': 'synthetic-summary',
  });

  const hdr = html('div', { className: 'flex items-center gap-2 mb-2' }, [
    html('span', { className: 'text-[10px] font-bold uppercase tracking-wider text-indigo-300' }, 'SYSTEM'),
    html('span', { className: 'text-[10px] text-slate-500' }, 'Injected Compaction Summary'),
    html('span', { className: 'text-[10px] text-slate-600 ml-auto font-mono' }, `first_kept_index=${firstKeptIndex}`),
  ]);
  card.appendChild(hdr);

  const previewText = summary || '(summary unavailable)';
  if (previewText.length > 2500) {
    const preview = html('div', { className: 'text-sm text-slate-300 whitespace-pre-wrap break-words max-h-48 overflow-hidden' }, previewText.slice(0, 1500) + '…');
    const full = html('div', { className: 'text-sm text-slate-300 whitespace-pre-wrap break-words hidden' }, previewText);
    const toggle = html('button', { className: 'text-[10px] text-accent-400 hover:text-accent-300 mt-1', onClick: () => {
      const showing = full.classList.contains('hidden');
      preview.classList.toggle('hidden', showing);
      full.classList.toggle('hidden', !showing);
      toggle.textContent = showing ? 'Show less' : `Show all (${previewText.length} chars)`;
    }}, `Show all (${previewText.length} chars)`);
    card.appendChild(preview);
    card.appendChild(full);
    card.appendChild(toggle);
  } else {
    card.appendChild(html('div', { className: 'text-sm text-slate-300 whitespace-pre-wrap break-words' }, previewText));
  }

  return card;
}

function _buildPathList(paths, label) {
  if (!paths || !paths.length) return null;
  const section = html('div', { className: 'mt-2' });
  section.appendChild(html('div', { className: 'text-[10px] text-slate-500 uppercase tracking-wider mb-1' }, `${label} (${paths.length})`));
  const body = html('div', { className: 'text-xs text-slate-400 font-mono whitespace-pre-wrap break-all bg-bg-900/40 rounded p-2 max-h-32 overflow-y-auto' },
    paths.slice(0, 20).join('\n') + (paths.length > 20 ? `\n… +${paths.length - 20} more` : ''));
  section.appendChild(body);
  return section;
}

function buildCompactionEntryEl(msg, globalIdx) {
  const summary = String(msg.summary || '');
  const firstKeptIndex = msg.first_kept_index ?? '—';
  const tokensBefore = msg.tokens_before ?? '—';
  const fileOps = msg.file_ops || {};
  const readFiles = Array.isArray(fileOps.read_files) ? fileOps.read_files : [];
  const modifiedFiles = Array.isArray(fileOps.modified_files) ? fileOps.modified_files : [];

  const msgEl = html('div', {
    className: 'msg-system rounded-md px-4 py-3 border border-indigo-500/30 bg-indigo-950/20',
    'data-role': 'system',
    'data-global-idx': String(globalIdx),
    'data-msg-type': 'compaction',
  });

  const details = html('div', { className: 'hidden mt-2 border-t border-indigo-500/20 pt-2' });
  const arrow = html('span', { className: 'text-[10px] text-indigo-300 ml-1' }, '▶');
  const hdr = html('div', {
    className: 'flex items-center gap-2 mb-1.5 cursor-pointer',
    onClick: () => {
      details.classList.toggle('hidden');
      arrow.textContent = details.classList.contains('hidden') ? '▶' : '▼';
    },
  }, [
    html('span', { className: 'text-[10px] font-bold uppercase tracking-wider text-indigo-300' }, 'COMPACTION'),
    html('span', { className: 'text-[10px] text-slate-600 font-mono' }, `#${globalIdx}`),
    html('span', { className: 'text-[10px] text-slate-500 ml-2' }, `first_kept=${firstKeptIndex}`),
    html('span', { className: 'text-[10px] text-slate-500' }, `tokens_before=${tokensBefore}`),
    html('span', { className: 'text-[10px] text-slate-500' }, `files: r${readFiles.length}/w${modifiedFiles.length}`),
    html('span', { className: 'text-[10px] text-slate-600 ml-auto' }, fmtDate(msg.timestamp)),
  ]);
  hdr.appendChild(arrow);
  msgEl.appendChild(hdr);

  const summaryLabel = html('div', { className: 'text-[10px] text-indigo-300 uppercase tracking-wider mb-1' }, 'Structured Summary');
  details.appendChild(summaryLabel);

  if (summary.length > 2500) {
    const preview = html('div', { className: 'text-sm text-slate-300 whitespace-pre-wrap break-words max-h-48 overflow-hidden' }, summary.slice(0, 1500) + '…');
    const full = html('div', { className: 'text-sm text-slate-300 whitespace-pre-wrap break-words hidden' }, summary);
    const toggle = html('button', { className: 'text-[10px] text-accent-400 hover:text-accent-300 mt-1', onClick: (e) => {
      e.stopPropagation();
      const showing = full.classList.contains('hidden');
      preview.classList.toggle('hidden', showing);
      full.classList.toggle('hidden', !showing);
      toggle.textContent = showing ? 'Show less' : `Show all (${summary.length} chars)`;
    }}, `Show all (${summary.length} chars)`);
    details.appendChild(preview);
    details.appendChild(full);
    details.appendChild(toggle);
  } else {
    details.appendChild(html('div', { className: 'text-sm text-slate-300 whitespace-pre-wrap break-words' }, summary || '(empty summary)'));
  }

  const readSection = _buildPathList(readFiles, 'Read files');
  const modifiedSection = _buildPathList(modifiedFiles, 'Modified files');
  if (readSection) details.appendChild(readSection);
  if (modifiedSection) details.appendChild(modifiedSection);

  msgEl.appendChild(details);
  return msgEl;
}

function buildMessageEl(msg, globalIdx, ctxByMsgIdx, ctxEntries, ctxCursorRef) {
  if (msg && msg._type === 'compaction') {
    return buildCompactionEntryEl(msg, globalIdx);
  }

  const role = msg.role || 'unknown';
  const roleClass = `msg-${_classifyRole(role)}`;
  const roleLabel = role.toUpperCase();
  const roleColors = { system: 'text-slate-400', user: 'text-blue-400', assistant: 'text-green-400', tool: 'text-amber-400' };

  const msgEl = html('div', {
    className: `${roleClass} rounded-md px-4 py-3`,
    'data-role': _classifyRole(role),
    'data-global-idx': String(globalIdx),
    'data-msg-type': 'message',
  });

  // Header row
  const hdrRow = html('div', { className: 'flex items-center gap-2 mb-1.5' }, [
    html('span', { className: `text-[10px] font-bold uppercase tracking-wider ${roleColors[role] || 'text-slate-400'}` }, roleLabel),
    html('span', { className: 'text-[10px] text-slate-600 font-mono' }, `#${globalIdx}`),
  ]);
  if (msg.timestamp) {
    hdrRow.appendChild(html('span', { className: 'text-[10px] text-slate-600 ml-auto' }, fmtDate(msg.timestamp)));
  }
  msgEl.appendChild(hdrRow);

  // Context panel for user messages
  if (role === 'user' && ctxByMsgIdx && ctxEntries) {
    let ctxEntry = ctxByMsgIdx.get(globalIdx);
    if (!ctxEntry && ctxCursorRef.v < ctxEntries.length) {
      const candidate = ctxEntries[ctxCursorRef.v];
      const candidateIdx = candidate.user_message_index;
      if (candidateIdx == null || Math.abs(candidateIdx - globalIdx) <= 3) {
        ctxEntry = candidate;
        ctxCursorRef.v++;
      }
    }
    if (ctxEntry) {
      msgEl.appendChild(buildContextPanel(ctxEntry));
    }
  }

  // Content
  const content = msg.content || '';
  if (role === 'tool' && msg.tool_call_id) {
    msgEl.appendChild(html('div', { className: 'text-xs text-amber-300/60 font-mono mb-1' }, `tool_call_id: ${msg.tool_call_id}`));
    const pre = html('div', { className: 'font-mono text-xs text-slate-300 whitespace-pre-wrap break-all max-h-40 overflow-y-auto bg-bg-900/50 rounded p-2' }, truncate(content, 2000));
    const toggle = html('button', { className: 'text-[10px] text-accent-400 hover:text-accent-300 mt-1', onClick: () => {
      if (pre.style.maxHeight === 'none') { pre.style.maxHeight = '10rem'; toggle.textContent = 'Show more'; }
      else { pre.style.maxHeight = 'none'; toggle.textContent = 'Show less'; }
    }}, content.length > 2000 ? 'Show more' : '');
    msgEl.appendChild(pre);
    if (content.length > 500) msgEl.appendChild(toggle);
  } else if (content.length > 3000) {
    const preview = html('div', { className: 'text-sm text-slate-300 whitespace-pre-wrap break-words max-h-48 overflow-hidden' }, content.slice(0, 1500) + '…');
    const full = html('div', { className: 'text-sm text-slate-300 whitespace-pre-wrap break-words hidden' }, content);
    const toggle = html('button', { className: 'text-[10px] text-accent-400 hover:text-accent-300 mt-1', onClick: () => {
      const showing = full.classList.contains('hidden');
      preview.classList.toggle('hidden', showing);
      full.classList.toggle('hidden', !showing);
      toggle.textContent = showing ? 'Show less' : `Show all (${content.length} chars)`;
    }}, `Show all (${content.length} chars)`);
    msgEl.appendChild(preview);
    msgEl.appendChild(full);
    msgEl.appendChild(toggle);
  } else {
    msgEl.appendChild(html('div', { className: 'text-sm text-slate-300 whitespace-pre-wrap break-words' }, content));
  }

  // Tool calls (from assistant messages)
  if (msg.tool_calls && msg.tool_calls.length) {
    for (const tc of msg.tool_calls) {
      const fn = tc.function || tc;
      const tcEl = html('div', { className: 'mt-2 bg-bg-900/50 rounded-md p-2 border border-surface-600' }, [
        html('div', { className: 'flex items-center gap-2 cursor-pointer', onClick: (e) => {
          e.currentTarget.nextElementSibling.classList.toggle('hidden');
        }}, [
          html('span', { className: 'text-xs text-amber-300 font-mono font-semibold' }, `${fn.name || 'tool'}`),
          html('span', { className: 'text-[10px] text-slate-500' }, '(click to toggle args)'),
        ]),
        html('pre', { className: 'hidden text-xs text-slate-400 mt-1 whitespace-pre-wrap break-all max-h-60 overflow-y-auto' },
          typeof fn.arguments === 'string' ? fn.arguments : JSON.stringify(fn.arguments, null, 2)
        ),
      ]);
      msgEl.appendChild(tcEl);
    }
  }

  return msgEl;
}

async function renderSession() {
  const { agent, sessionKey } = state;
  setBreadcrumbs(
    { label: 'Agents', onClick: () => navigate('agents') },
    { label: agent, onClick: () => navigate('agent-detail', { agent, tab: 'sessions' }) },
    { label: 'Session' },
  );

  const app = $('#app');
  app.innerHTML = '<div class="flex justify-center mt-20"><div class="spinner"></div></div>';

  // First fetch: lightweight call to get metadata + total message count.
  // We request offset=0&limit=0 so no messages are returned — just metadata + count.
  const metaResp = await api(`/api/agents/${agent}/sessions/${sessionKey}?offset=0&limit=1`);
  const totalMessages = metaResp.messageCount;
  const metadata = metaResp.metadata;
  const lastConsolidated = metadata.last_consolidated || 0;
  const metaCompactions = metaResp.compactions || [];

  // Now fetch the last SESSION_PAGE_SIZE messages + context log in parallel.
  const initialOffset = Math.max(0, totalMessages - SESSION_PAGE_SIZE);
  const [pageData, ctxData] = await Promise.all([
    api(`/api/agents/${agent}/sessions/${sessionKey}?offset=${initialOffset}&limit=${SESSION_PAGE_SIZE}`),
    api(`/api/agents/${agent}/sessions/${sessionKey}/context`).catch(() => ({ entries: [] })),
  ]);

  const loadedMessages = pageData.messages;  // the actual messages we got back
  // Merge compactions from both fetches (dedup by first_kept_index)
  const allCompactions = [...metaCompactions, ...(pageData.compactions || [])];
  const compactionsByFKI = new Map();
  for (const c of allCompactions) {
    const fki = Number(c.first_kept_index);
    if (Number.isFinite(fki) && fki >= 0) compactionsByFKI.set(fki, c);
  }
  const lastCompaction = allCompactions.length > 0 ? allCompactions[allCompactions.length - 1] : null;
  const firstKeptIndexRaw = lastCompaction ? Number(lastCompaction.first_kept_index) : NaN;
  const firstKeptIndex = Number.isFinite(firstKeptIndexRaw) && firstKeptIndexRaw >= 0
    ? firstKeptIndexRaw
    : (lastConsolidated || 0);
  const hasCompactionState = firstKeptIndex > 0;
  const llmSummaryText = (lastCompaction && typeof lastCompaction.summary === 'string')
    ? lastCompaction.summary
    : '';
  if (!hasCompactionState) {
    sessionFilterState.llmView = false;
  }
  app.innerHTML = '';

  // Context log index
  const ctxEntries = ctxData.entries || [];
  const ctxByMsgIdx = new Map();
  for (const entry of ctxEntries) {
    const idx = entry.user_message_index;
    if (idx != null) ctxByMsgIdx.set(idx, entry);
  }

  // ---- Layout ----
  // Fixed header area (session info + sticky filter bar)
  const headerArea = html('div', { className: 'mb-0' });

  // Session info
  headerArea.appendChild(html('div', { className: 'mb-3' }, [
    html('h2', { className: 'text-lg font-semibold text-slate-200 font-mono' }, metadata.key || sessionKey),
    html('p', { className: 'text-xs text-slate-500 mt-1' }, [
      `${totalMessages} messages · consolidated through #${lastConsolidated} · created ${fmtDate(metadata.created_at)}`,
      hasCompactionState ? ` · first_kept_index #${firstKeptIndex}` : '',
      ctxEntries.length ? ` · ${ctxEntries.length} context log entries` : '',
    ].join('')),
  ]));

  if (ctxEntries.length > 0) {
    headerArea.appendChild(html('div', { className: 'mb-2 text-[10px] text-purple-400' },
      '🧠 Context log available — click the purple bar on user messages to see what the LLM received'));
  }

  app.appendChild(headerArea);

  // Sticky filter bar
  const filterBar = html('div', {
    className: 'sticky top-12 z-40 bg-bg-900/95 backdrop-blur border-b border-surface-600 -mx-4 px-4 py-2 flex items-center gap-3 flex-wrap',
  });

  const filterLabel = html('span', { className: 'text-[10px] text-slate-500 uppercase tracking-wider font-semibold mr-1' }, 'Filter:');
  filterBar.appendChild(filterLabel);

  // Filter button styles — spelled out so Tailwind CDN can detect the classes
  const filterTypes = [
    { key: 'showUser', label: 'User', icon: '💬',
      activeClass: 'bg-blue-500/20 border-blue-500/50 text-blue-300',
    },
    { key: 'showAssistant', label: 'Assistant', icon: '🤖',
      activeClass: 'bg-green-500/20 border-green-500/50 text-green-300',
    },
    { key: 'showTool', label: 'Tool', icon: '🔧',
      activeClass: 'bg-amber-500/20 border-amber-500/50 text-amber-300',
    },
    { key: 'showSystem', label: 'System', icon: '⚙️',
      activeClass: 'bg-slate-500/20 border-slate-500/50 text-slate-300',
    },
  ];
  const inactiveClass = 'bg-surface-800 border-surface-700 text-slate-600 line-through';
  const btnBase = 'px-2.5 py-1 text-[11px] rounded-md border transition-all font-medium';

  const filterButtons = {};
  for (const ft of filterTypes) {
    const active = sessionFilterState[ft.key];
    const btn = html('button', {
      className: `${btnBase} ${active ? ft.activeClass : inactiveClass}`,
      onClick: () => {
        sessionFilterState[ft.key] = !sessionFilterState[ft.key];
        applyFilters();
        const nowActive = sessionFilterState[ft.key];
        btn.className = `${btnBase} ${nowActive ? ft.activeClass : inactiveClass}`;
      },
    }, `${ft.icon} ${ft.label}`);
    filterButtons[ft.key] = btn;
    filterBar.appendChild(btn);
  }

  const llmBtnBase = 'px-2.5 py-1 text-[11px] rounded-md border transition-all font-medium';
  const llmActiveClass = 'bg-indigo-500/20 border-indigo-500/50 text-indigo-300';
  const llmInactiveClass = hasCompactionState
    ? 'bg-surface-800 border-surface-700 text-slate-400'
    : 'bg-surface-800 border-surface-700 text-slate-600 cursor-not-allowed';
  const llmButton = html('button', {
    className: `${llmBtnBase} ${sessionFilterState.llmView ? llmActiveClass : llmInactiveClass}`,
    title: hasCompactionState
      ? `Show only LLM window from #${firstKeptIndex} plus injected compaction summary`
      : 'No compaction boundary available for this session',
    onClick: () => {
      if (!hasCompactionState) return;
      sessionFilterState.llmView = !sessionFilterState.llmView;
      llmButton.className = `${llmBtnBase} ${sessionFilterState.llmView ? llmActiveClass : llmInactiveClass}`;
      applyFilters();
    },
  }, '🧠 LLM View');
  filterBar.appendChild(llmButton);

  // Message count indicator — tracks loaded messages explicitly
  let loadedCount = loadedMessages.length;
  const countIndicator = html('span', { className: 'text-[10px] text-slate-500 ml-auto font-mono', id: 'msg-count-indicator' },
    `Showing ${loadedCount} of ${totalMessages}`);
  filterBar.appendChild(countIndicator);

  app.appendChild(filterBar);

  // Scrollable message area
  const scrollContainer = html('div', {
    className: 'mt-2',
    id: 'session-scroll-container',
  });

  // "Load more" button at top
  let currentOffset = initialOffset;
  const loadMoreContainer = html('div', { id: 'load-more-container', className: 'mb-3' });

  if (currentOffset > 0) {
    const loadMoreBtn = html('button', {
      className: 'w-full py-3 text-sm text-accent-400 hover:text-accent-300 bg-surface-800 hover:bg-surface-700 border border-surface-600 rounded-lg transition-colors font-medium',
      id: 'load-more-btn',
      onClick: loadOlderMessages,
    }, `⬆ Load older messages (${currentOffset} remaining)`);
    loadMoreContainer.appendChild(loadMoreBtn);
  }
  scrollContainer.appendChild(loadMoreContainer);

  const llmSummaryCard = buildCompactionSummaryCard(llmSummaryText, firstKeptIndex);
  llmSummaryCard.id = 'llm-summary-card';
  llmSummaryCard.style.display = 'none';
  scrollContainer.appendChild(llmSummaryCard);

  // Timeline container
  const timeline = html('div', { className: 'space-y-2', id: 'session-timeline' });
  scrollContainer.appendChild(timeline);
  app.appendChild(scrollContainer);

  // Track context cursor for sequential matching
  // We need to find the right cursor position for the loaded page
  const ctxCursorRef = { v: 0 };
  // Advance cursor to match our starting offset
  for (let i = 0; i < ctxEntries.length; i++) {
    if ((ctxEntries[i].user_message_index || 0) >= initialOffset) {
      ctxCursorRef.v = i;
      break;
    }
  }

  // Render initial page
  let consolidationMarkerShown = initialOffset >= lastConsolidated;
  let promptBoundaryShown = initialOffset >= firstKeptIndex;
  renderMessageBatch(loadedMessages, initialOffset, timeline, {
    lastConsolidated,
    firstKeptIndex,
    compactionsByFKI,
    ctxByMsgIdx, ctxEntries, ctxCursorRef,
    consolidationMarkerShown,
    promptBoundaryShown,
  });

  // Scroll to bottom
  requestAnimationFrame(() => {
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'instant' });
  });

  // Apply initial filters
  applyFilters();

  // ---- Load older messages ----
  async function loadOlderMessages() {
    const btn = document.getElementById('load-more-btn');
    if (!btn || currentOffset <= 0) return;
    btn.textContent = '⏳ Loading...';
    btn.disabled = true;

    const newOffset = Math.max(0, currentOffset - SESSION_PAGE_SIZE);
    const fetchLimit = currentOffset - newOffset;

    try {
      const olderData = await api(`/api/agents/${agent}/sessions/${sessionKey}?offset=${newOffset}&limit=${fetchLimit}`);

      // Save scroll position (distance from bottom)
      const scrollBottom = document.body.scrollHeight - window.scrollY;

      // Build new elements in a temp container
      const fragment = document.createDocumentFragment();
      const tempTimeline = html('div', { className: 'space-y-2' });

      // Reset context cursor for this batch
      const batchCtxCursor = { v: 0 };
      for (let i = 0; i < ctxEntries.length; i++) {
        if ((ctxEntries[i].user_message_index || 0) >= newOffset) {
          batchCtxCursor.v = i;
          break;
        }
      }

      const batchConsolidationShown = newOffset >= lastConsolidated;
      const batchPromptShown = newOffset >= firstKeptIndex;
      renderMessageBatch(olderData.messages, newOffset, tempTimeline, {
        lastConsolidated,
        firstKeptIndex,
        compactionsByFKI,
        ctxByMsgIdx, ctxEntries, ctxCursorRef: batchCtxCursor,
        consolidationMarkerShown: batchConsolidationShown,
        promptBoundaryShown: batchPromptShown,
      });

      // If this batch includes the consolidation marker, remove any duplicate from the existing timeline
      if (!batchConsolidationShown && newOffset < lastConsolidated) {
        const existingMarker = timeline.querySelector('.consolidation-marker');
        if (existingMarker) existingMarker.remove();
        consolidationMarkerShown = true;
      }
      if (!batchPromptShown && newOffset < firstKeptIndex) {
        const existingPromptMarker = timeline.querySelector('.prompt-window-marker');
        if (existingPromptMarker) existingPromptMarker.remove();
        promptBoundaryShown = true;
      }

      // Prepend the new messages before existing ones
      while (tempTimeline.firstChild) {
        fragment.appendChild(tempTimeline.firstChild);
      }
      timeline.insertBefore(fragment, timeline.firstChild);

      currentOffset = newOffset;
      loadedCount += olderData.messages.length;

      // Update load more button
      const container = document.getElementById('load-more-container');
      container.innerHTML = '';
      if (currentOffset > 0) {
        const newBtn = html('button', {
          className: 'w-full py-3 text-sm text-accent-400 hover:text-accent-300 bg-surface-800 hover:bg-surface-700 border border-surface-600 rounded-lg transition-colors font-medium',
          id: 'load-more-btn',
          onClick: loadOlderMessages,
        }, `⬆ Load older messages (${currentOffset} remaining)`);
        container.appendChild(newBtn);
      }

      // Restore scroll position (maintain distance from bottom)
      requestAnimationFrame(() => {
        window.scrollTo({ top: document.body.scrollHeight - scrollBottom, behavior: 'instant' });
      });

      // Apply filters to new messages (also updates the count indicator)
      applyFilters();

    } catch (e) {
      btn.textContent = `⚠ Error: ${e.message}. Click to retry.`;
      btn.disabled = false;
    }
  }

  function applyFilters() {
    const allMsgs = timeline.querySelectorAll('[data-role]');
    let visibleCount = 0;
    const llmMode = hasCompactionState && sessionFilterState.llmView;
    llmSummaryCard.style.display = llmMode ? '' : 'none';

    allMsgs.forEach(el => {
      const role = el.getAttribute('data-role');
      const key = 'show' + role.charAt(0).toUpperCase() + role.slice(1);
      const showRole = sessionFilterState[key] !== false;
      const globalIdx = Number(el.getAttribute('data-global-idx') || -1);
      const msgType = el.getAttribute('data-msg-type') || 'message';
      const showByLLM = !llmMode
        ? true
        : (msgType !== 'compaction' && globalIdx >= firstKeptIndex);
      const show = showRole && showByLLM;
      el.style.display = show ? '' : 'none';
      if (show) visibleCount++;
    });
    // Update count indicator
    const indicator = document.getElementById('msg-count-indicator');
    if (indicator) {
      const prefix = llmMode ? 'LLM View · ' : '';
      if (visibleCount === loadedCount) {
        indicator.textContent = `${prefix}${loadedCount} of ${totalMessages} loaded`;
      } else {
        indicator.textContent = `${prefix}${visibleCount} visible · ${loadedCount} loaded · ${totalMessages} total`;
      }
    }
  }
}

function renderMessageBatch(messages, startOffset, container, opts) {
  const {
    lastConsolidated,
    firstKeptIndex,
    compactionsByFKI,
    ctxByMsgIdx, ctxEntries, ctxCursorRef,
  } = opts;
  let consolidationMarkerShown = opts.consolidationMarkerShown || false;
  let promptBoundaryShown = opts.promptBoundaryShown || false;
  // Track which compaction cards we've rendered so we don't duplicate
  const renderedCompactions = opts._renderedCompactions || new Set();

  messages.forEach((msg, localIdx) => {
    const globalIdx = startOffset + localIdx;

    // Render compaction card at its logical position (first_kept_index)
    // The card appears just before the prompt window boundary
    if (compactionsByFKI) {
      const compaction = compactionsByFKI.get(globalIdx);
      if (compaction && !renderedCompactions.has(globalIdx)) {
        renderedCompactions.add(globalIdx);
        container.appendChild(buildCompactionEntryEl(compaction, globalIdx));
      }
    }

    // LLM prompt window boundary
    if (!promptBoundaryShown && globalIdx >= firstKeptIndex && firstKeptIndex > 0) {
      promptBoundaryShown = true;
      container.appendChild(buildPromptWindowMarker(firstKeptIndex));
    }

    // Consolidation boundary
    if (!consolidationMarkerShown && globalIdx >= lastConsolidated && lastConsolidated > 0) {
      consolidationMarkerShown = true;
      container.appendChild(buildConsolidationMarker(lastConsolidated));
    }

    const el = buildMessageEl(msg, globalIdx, ctxByMsgIdx, ctxEntries, ctxCursorRef);
    container.appendChild(el);
  });

  // Update the flags on opts so caller knows
  opts.consolidationMarkerShown = consolidationMarkerShown;
  opts.promptBoundaryShown = promptBoundaryShown;
  opts._renderedCompactions = renderedCompactions;
}

      className: `tab-btn px-4 py-2 text-sm font-medium border-b-2 ${state.graphTab === t ? 'active text-accent-400 border-accent-500' : 'text-slate-500 border-transparent hover:text-slate-300'}`,
      onClick: () => { state.graphTab = t; renderGraph(); },
